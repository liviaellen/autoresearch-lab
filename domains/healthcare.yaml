name: Healthcare
description: Clinical prediction, disease classification, and patient outcome modeling

questions:
  - id: condition
    prompt: What medical condition or outcome are you studying?
    type: text
    required: true

  - id: goal
    prompt: What is the research goal?
    type: choice
    choices:
      - Predict patient outcome
      - Diagnose condition
      - Risk stratification
      - Treatment response prediction
      - Other
    required: true

  - id: features
    prompt: What clinical features are available (comma-separated)?
    type: text
    default: "vitals, lab_results, demographics, medications, diagnoses"
    required: true

  - id: task_type
    prompt: Is this prediction or classification?
    type: choice
    choices:
      - prediction
      - classification
    required: true

  - id: metric
    prompt: Primary evaluation metric
    type: choice
    choices:
      - AUC-ROC
      - Sensitivity (Recall)
      - Specificity
      - F1-score
      - C-statistic
    default: AUC-ROC
    required: true

  - id: dataset_path
    prompt: Path to your dataset
    type: text
    required: true

  - id: interpretability
    prompt: Is clinical interpretability required?
    type: choice
    choices:
      - "yes"
      - "no"
    default: "yes"
    required: true

  - id: time_budget
    prompt: Time budget per experiment (minutes)
    type: number
    default: 5
    required: true

constraints:
  - Clinical interpretability is critical — prefer explainable models
  - Handle missing clinical data with clinically appropriate imputation
  - Report sensitivity and specificity alongside primary metric
  - Validate on temporally held-out data when possible
  - Never leak future information into training features

defaults:
  metric: AUC-ROC
  time_budget: 5

answer_mapping:
  goal: objective
  dataset_path: dataset_path
  metric: metric
  time_budget: time_budget

template_defaults:
  dataset_description: "Clinical dataset with patient outcomes, vitals, lab results, and demographics."
  strategy: |
    Start with logistic regression for interpretable baseline.
    Then test gradient boosting (XGBoost, LightGBM).
    Evaluate calibration alongside discrimination.
    Prioritize models that clinicians can understand and trust.
  model_families:
    - Logistic Regression
    - XGBoost / LightGBM
    - Random Forest
    - Neural Networks (with SHAP explanations)
  allowed_files:
    - train.py
    - train_mlx.py
  forbidden_actions:
    - Installing new packages
    - Modifying evaluation pipeline
    - Leaking future information into features
    - Removing clinical validation checks
  reporting: |
    Log results to results.tsv (tab-separated).
    Include calibration metrics and confusion matrix.
    Report sensitivity/specificity at clinically relevant thresholds.
