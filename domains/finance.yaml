name: Finance
description: Financial prediction, risk modeling, and market analysis

questions:
  - id: target
    prompt: What financial outcome are you predicting?
    type: text
    required: true

  - id: goal
    prompt: What is the research goal?
    type: choice
    choices:
      - Price prediction
      - Risk classification
      - Fraud detection
      - Portfolio optimization
      - Credit scoring
      - Other
    required: true

  - id: features
    prompt: What financial features are available (comma-separated)?
    type: text
    default: "price_history, volume, fundamentals, market_indicators"
    required: true

  - id: task_type
    prompt: Is this prediction or classification?
    type: choice
    choices:
      - prediction
      - classification
    required: true

  - id: metric
    prompt: Primary evaluation metric
    type: choice
    choices:
      - Sharpe Ratio
      - MAE
      - RMSE
      - AUC-ROC
      - Precision at top-k
    default: Sharpe Ratio
    required: true

  - id: dataset_path
    prompt: Path to your dataset
    type: text
    required: true

  - id: time_budget
    prompt: Time budget per experiment (minutes)
    type: number
    default: 5
    required: true

constraints:
  - Prevent look-ahead bias — strict temporal train/test splits
  - Account for transaction costs in performance metrics
  - Handle non-stationary distributions
  - Report risk-adjusted returns alongside raw performance

defaults:
  metric: Sharpe Ratio
  time_budget: 5

answer_mapping:
  goal: objective
  dataset_path: dataset_path
  metric: metric
  time_budget: time_budget

template_defaults:
  dataset_description: "Financial dataset with price history, volume, and market indicators."
  strategy: |
    Start with linear models as baseline.
    Then test gradient boosting with temporal features.
    Explore LSTM/Transformer architectures for sequential patterns.
    Always use walk-forward validation.
  model_families:
    - Linear / Ridge Regression
    - XGBoost / LightGBM
    - LSTM
    - Transformer
  allowed_files:
    - train.py
    - train_mlx.py
  forbidden_actions:
    - Installing new packages
    - Modifying evaluation pipeline
    - Using future data in feature engineering
    - Ignoring transaction costs
  reporting: |
    Log results to results.tsv (tab-separated).
    Include risk-adjusted metrics (Sharpe, Sortino).
    Report max drawdown and win rate.
